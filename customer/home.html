<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | LocalLink</title>
    <link rel="stylesheet" href="css/customer.css">
</head>
<body>

    <header class="app-header">
        <div class="header-top">
            <div>
                <span style="font-size: 0.8rem; color: var(--text-muted);">Delivering to</span><br>
                <span class="location-tag">📍 Main Street, CBD</span>
            </div>
            <div>🔔 1</div>
        </div>
        <input type="text" class="search-bar" placeholder="Search burgers, pizza, restaurants...">
    </header>

    <div class="page-container">
        <h3 class="section-title">Categories <a href="#">See all</a></h3>
        <div class="category-scroll">
            <div class="category-card">🍔<br>Burgers</div>
            <div class="category-card">🍕<br>Pizza</div>
            <div class="category-card">🥩<br>Braai</div>
            <div class="category-card">🥤<br>Drinks</div>
            <div class="category-card">☕<br>Coffee</div>
        </div>

        <br>

        <h3 class="section-title">Nearby Favourites</h3>
        
        <div class="restaurant-card">
            <div class="rest-image"></div>
            <div class="rest-info">
                <h3>Joe's Burger Joint</h3>
                <div class="rest-meta">
                    <span>⭐ 4.8</span>
                    <span>• 2.5 km</span>
                    <span>• 20-30 min</span>
                </div>
            </div>
        </div>

        <div class="restaurant-card">
            <div class="rest-image"></div>
            <div class="rest-info">
                <h3>Mama's Traditional Food</h3>
                <div class="rest-meta">
                    <span>⭐ 4.9</span>
                    <span>• 1.2 km</span>
                    <span>• 15-25 min</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active"><span>🏠</span>Home</a>
        <a href="#" class="nav-item"><span>🔍</span>Search</a>
        <a href="#" class="nav-item"><span>🛒</span>Cart</a>
        <a href="#" class="nav-item"><span>📦</span>Orders</a>
        <a href="profile.html" class="nav-item"><span>👤</span>Profile</a>
    </nav>

    <script type="module" src="js/home.js"></script>
</body>
</html>
