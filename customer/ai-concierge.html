    </div>
    <div class="input-group">
        <input type="text" id="userInput" placeholder="Ask me for a recommendation...">
        <button onclick="sendToAI()">Send</button>

        const response = await fetch('https://your-project.cloudfunctions.net/askAI', {
            method: 'POST',
            body: JSON.stringify({ message: input, uid: 'current_user_uid' })
        });
        const data = await response.json();

</script>
