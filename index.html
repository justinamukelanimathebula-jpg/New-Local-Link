<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LocalLink Mall</title>
  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
    .store-card { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; display: flex; align-items: center; gap: 15px; cursor: pointer; border: 1px solid #334155; }
    .store-logo { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; }
    .info h3 { margin: 0; font-size: 1.1rem; }
    .info p { margin: 5px 0 0; font-size: 0.8rem; color: #94a3b8; }
  </style>
</head>
<body>
  <h1>Welcome to LocalLink</h1>
  <div id="store-list">Loading shops...</div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js';
    import { getFirestore, collection, onSnapshot } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js';

    const firebaseConfig = { apiKey: "AIzaSyDbOi2aD5eFsiUi6mfFTS-wOj-jWbi5-9M", authDomain: "local-link-mm.firebaseapp.com", projectId: "local-link-mm", storageBucket: "local-link-mm.firebasestorage.app", messagingSenderId: "945184893851", appId: "1:945184893851:web:c84bf0bc2db2d2c81a4f3e" };
    const db = getFirestore(initializeApp(firebaseConfig));

    onSnapshot(collection(db, "stores"), (s) => {
        const list = document.getElementById('store-list');
        list.innerHTML = "";
        s.forEach((doc) => {
            const s = doc.data();
            list.innerHTML += `<div class="store-card" onclick="window.location.href='pages/customer-dashboard.html?storeId=${doc.id}'">
                <img src="${s.logo}" class="store-logo">
                <div class="info"><h3>${s.name}</h3><p>${s.description}</p></div>
            </div>`;
        });
    });
  </script>
</body>
</html>
