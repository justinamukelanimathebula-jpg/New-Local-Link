<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store Menu</title>
  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
    #logo { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; }
    .item { background: #1e293b; padding: 15px; margin-top: 10px; border-radius: 8px; }
  </style>
</head>
<body>
  <img id="logo" src="">
  <h1 id="name">Loading...</h1>
  <p id="desc"></p>
  <div id="menu-list"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js';
    import { getFirestore, doc, getDoc, collection, query, where, onSnapshot } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js';

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDbOi2aD5eFsiUi6mfFTS-wOj-jWbi5-9M", authDomain: "local-link-mm.firebaseapp.com", projectId: "local-link-mm", storageBucket: "local-link-mm.firebasestorage.app", messagingSenderId: "945184893851", appId: "1:945184893851:web:c84bf0bc2db2d2c81a4f3e" }));
    
    const storeId = new URLSearchParams(window.location.search).get('storeId');
    
    async function init() {
        if(!storeId) { document.body.innerHTML = "<h1>Missing Store ID</h1>"; return; }
        
        // 1. Get Store Info
        const d = await getDoc(doc(db, "stores", storeId));
        if(d.exists()) {
            const s = d.data();
            document.getElementById('name').innerText = s.name;
            document.getElementById('desc').innerText = s.description;
            document.getElementById('logo').src = s.logo;
            
            // 2. Get Menu Items
            const q = query(collection(db, "menu"), where("storeId", "==", storeId));
            onSnapshot(q, (snap) => {
                const list = document.getElementById('menu-list');
                list.innerHTML = "";
                snap.forEach(i => {
                    list.innerHTML += `<div class="item"><h3>${i.data().name}</h3><p>$${i.data().price}</p></div>`;
                });
            });
        } else {
            document.body.innerHTML = "<h1>Store Not Found in Database.</h1>";
        }
    }
    init();
  </script>
</body>
</html>
