<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - LocalLink</title>
  <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
  <script>var vConsole = new VConsole();</script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <h1>Join LocalLink</h1>
    <div id="signupContainer">
      <input type="text" id="fullName" placeholder="Full Name">
      <input type="email" id="email" placeholder="Email">
      <input type="tel" id="phone" placeholder="Phone Number">
      
      <select id="userType">
        <option value="resident">Resident / Customer</option>
        <option value="business">Business Owner</option>
      </select>
      <input type="password" id="password" placeholder="Password">
      <input type="password" id="confirmPassword" placeholder="Confirm Password">
      
      <button id="createBtn">Create Account</button>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js';
const firebaseConfig = {
  apiKey: "AIzaSyDbOi2aD5eFsiUi6mfFTS-wOj-jWbi5-9M",
  authDomain: "local-link-mm.firebaseapp.com",
  projectId: "local-link-mm",
  storageBucket: "local-link-mm.firebasestorage.app",
  messagingSenderId: "945184893851",
  appId: "1:945184893851:web:c84bf0bc2db2d2c81a4f3e"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    document.getElementById('createBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      // Basic Validation
      if (password !== confirmPassword) {
        alert("Passwords do not match!");
        return;
      }
      try {
        const user = await createUserWithEmailAndPassword(auth, email, password);
        console.log("Success:", user);
        alert("Account created successfully!");
        window.location.href = '../dashboard.html'; 
      } catch (error) {
        console.error("FIREBASE ERROR:", error);
        alert("Error: " + error.code);
      }
    });
  </script>
</body>
</html>
