<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vendor Master Hub</title>
  <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
  <style>
    body { background: #0f172a; color: white; font-family: sans-serif; padding: 20px; }
    .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #334155; }
    input { width: 100%; padding: 10px; margin: 5px 0; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
    .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; color: white; width: 100%; margin-top: 5px; }
    .btn-blue { background: #3b82f6; }
    .btn-green { background: #22c55e; }
  </style>
</head>
<body>

  <div class="card">
    <h3>1. Setup Store</h3>
    <input type="text" id="storeName" placeholder="Store Name">
    <input type="text" id="storeDesc" placeholder="Description">
    <button id="logoBtn" class="btn btn-blue">Upload Logo</button>
    <button id="publishBtn" class="btn btn-green">Publish Store Profile</button>
  </div>

  <div class="card">
    <h3>Live Orders</h3>
    <div id="new-orders">None</div>
  </div>

  <div class="card">
    <h3>Add Menu Item</h3>
    <input type="text" id="itemName" placeholder="Item Name">
    <input type="number" id="itemPrice" placeholder="Price">
    <button id="addMenuBtn" class="btn btn-blue">Add to Menu</button>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js';
    import { getFirestore, collection, addDoc, setDoc, doc } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js';

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDbOi2aD5eFsiUi6mfFTS-wOj-jWbi5-9M", authDomain: "local-link-mm.firebaseapp.com", projectId: "local-link-mm", storageBucket: "local-link-mm.firebasestorage.app", messagingSenderId: "945184893851", appId: "1:945184893851:web:c84bf0bc2db2d2c81a4f3e" }));
    
    let logoUrl = "";
    var widget = cloudinary.createUploadWidget({ cloudName: 'dorplj8g9', uploadPreset: 'Local_link_preset' }, (e, r) => {
        if(r.event === "success") { logoUrl = r.info.secure_url; alert("Logo uploaded!"); }
    });
    document.getElementById("logoBtn").onclick = () => widget.open();

    // PUBLISH STORE
    document.getElementById("publishBtn").onclick = async () => {
        const id = document.getElementById('storeName').value.toLowerCase().replace(/\s+/g, '-');
        await setDoc(doc(db, "stores", id), { 
            name: document.getElementById('storeName').value, 
            description: document.getElementById('storeDesc').value, 
            logo: logoUrl 
        });
        localStorage.setItem('myStoreId', id); 
        alert("Store Published! ID: " + id);
    };

    // ADD MENU ITEM
    document.getElementById("addMenuBtn").onclick = async () => {
        const storeId = localStorage.getItem('myStoreId');
        if(!storeId) { alert("Please Publish Store Profile first!"); return; }
        await addDoc(collection(db, "menu"), { 
            name: document.getElementById('itemName').value, 
            price: document.getElementById('itemPrice').value, 
            storeId: storeId 
        });
        alert("Item Added!");
    };
  </script>
</body>
</html>
