<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Business Dashboard - LocalLink</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dashboard">
  <aside class="sidebar">
    <div class="sidebar-brand">LocalLink Business</div>
    <ul class="sidebar-nav">
      <li><a href="#" class="active">Dashboard</a></li>
      <li><a href="#">My Business</a></li>
      <li><a href="#">Services</a></li>
      <li><a href="#">Bookings</a></li>
      <li><a href="#">Orders</a></li>
      <li><a href="#">Reviews</a></li>
      <li><a href="#">Analytics</a></li>
      <li><a href="#">Profile</a></li>
      <li><a href="#" id="logoutBtn">Log Out</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <div class="dashboard-header">
      <h1>Business Dashboard</h1>
      <span id="currentDate"></span>
    </div>

    <div class="dashboard-cards">
      <div class="dashboard-card">
        <h3>Total Bookings</h3>
        <div class="value" id="bookingCount">0</div>
      </div>
      <div class="dashboard-card">
        <h3>Today's Orders</h3>
        <div class="value" id="orderCount">0</div>
      </div>
      <div class="dashboard-card">
        <h3>Customer Reviews</h3>
        <div class="value" id="reviewCount">0</div>
      </div>
      <div class="dashboard-card">
        <h3>Revenue</h3>
        <div class="value" id="revenueCount">$0</div>
      </div>
    </div>

    <div class="dashboard-section">
      <h2>Recent Bookings</h2>
      <div id="bookingsList">
        <p>No bookings yet.</p>
      </div>
    </div>

    <div class="dashboard-section">
      <h2>Quick Actions</h2>
      <div class="quick-actions">
        <button class="btn btn-primary">Add Service</button>
        <button class="btn btn-outline">View Menu</button>
        <button class="btn btn-outline">Promotions</button>
      </div>
    </div>
  </main>

  <script type="module">
    import Auth from '../js/auth.js';

    Auth.init();
    Auth.onAuthChange = (user) => {
      if (!user) {
        window.location.href = 'login.html';
      }
    };

    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    document.getElementById('logoutBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      await Auth.signOut();
    });
  </script>
</body>
</html>
