<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - LocalLink</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to your LocalLink account</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>

      <div class="form-group">
        <label for="userType">I am a...</label>
        <select id="userType" name="userType" required>
          <option value="">Select account type</option>
          <option value="customer">Resident / Customer</option>
          <option value="vendor">Business Owner</option>
          <option value="driver">Driver</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary" id="loginBtn">Log In</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </p>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js';

const firebaseConfig = {
  apiKey: "AIzaSyDbOi2aD5eFsiUi6mfFTS-wOj-jWbi5-9M",
  authDomain: "local-link-mm.firebaseapp.com",
  projectId: "local-link-mm",
  storageBucket: "local-link-mm.firebasestorage.app",
  messagingSenderId: "945184893851",
  appId: "1:945184893851:web:c84bf0bc2db2d2c81a4f3e"
};
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const form = document.getElementById('loginForm');

    form.addEventListener('submit', async (e) => {
      e.preventDefault(); // This stops the page from erasing your data!

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const userType = document.getElementById('userType').value;

      if (!userType) {
        alert("Please select an account type.");
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        
        // Redirect logic based on selection
        const redirects = {
          customer: 'customer-dashboard.html',
          vendor: 'vendor-dashboard.html',
          driver: 'driver-dashboard.html'
        };
        
        alert("Login successful!");
        window.location.href = redirects[userType] || 'dashboard.html';
      } catch (error) {
        console.error("Login Error:", error);
        alert("Error: " + error.code);
      }
    });
  </script>
</body>
</html>
