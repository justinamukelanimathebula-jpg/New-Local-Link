<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - LocalLink</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to your LocalLink account</p>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
        <span class="error-message" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Enter your password">
        <span class="error-message" id="passwordError"></span>
      </div>

      <div class="form-group">
        <label for="userType">I am a...</label>
        <select id="userType" name="userType" required>
          <option value="">Select account type</option>
          <option value="customer">Resident / Customer</option>
          <option value="vendor">Business Owner</option>
          <option value="driver">Driver</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary">Log In</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up</a>
    </p>
    <p class="auth-footer">
      <a href="../index.html">← Back to home</a>
    </p>
  </div>

  <script type="module">
    import Auth from '../js/auth.js';

    Auth.init();

    const form = document.getElementById('loginForm');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Clear errors
      emailError.textContent = '';
      passwordError.textContent = '';
      emailInput.classList.remove('error');
      passwordInput.classList.remove('error');

      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const userType = document.getElementById('userType').value;

      if (!email) {
        emailError.textContent = 'Please enter your email';
        emailInput.classList.add('error');
        return;
      }

      if (!password) {
        passwordError.textContent = 'Please enter your password';
        passwordInput.classList.add('error');
        return;
      }

      if (!userType) {
        alert('Please select your account type');
        return;
      }

      const result = await Auth.signIn(email, password);

      if (result.success) {
        // Redirect based on user type
        const redirects = {
          customer: 'customer-dashboard.html',
          vendor: 'vendor-dashboard.html',
          driver: 'driver-dashboard.html'
        };
        window.location.href = redirects[userType] || 'customer-dashboard.html';
      } else {
        passwordError.textContent = result.error;
        passwordInput.classList.add('error');
      }
    });
  </script>
</body>
</html>
