<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Partner Dashboard | LocalLink</title>
  <style>
    :root { --bg: #000000; --card: #171717; --primary: #22c55e; --text: #f8fafc; --accent: #3b82f6; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
    
    /* Partner Info & Earnings */
    .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .earnings-bar { display: flex; justify-content: space-between; background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; font-size: 0.9rem; }
    
    /* Order Card */
    .order-card { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--primary); }
    
    /* Big Buttons */
    .btn-action { width: 100%; padding: 20px; font-size: 1.2rem; font-weight: bold; border-radius: 12px; border: none; margin-bottom: 10px; cursor: pointer; color: white; }
    .accept { background: var(--primary); }
    .nav-btn { background: var(--accent); }
    .status-badge { background: #334155; padding: 5px 10px; border-radius: 20px; font-size: 0.8rem; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header-bar">
    <div><strong>LocalLink Partner</strong></div>
    <div class="status-badge" id="transportMode">Mode: Walking 🚶</div>
  </div>

  <!-- Earnings Tracker -->
  <div class="earnings-bar">
    <div>Tips: <span id="tips">$0.00</span></div>
    <div>Fees: <span id="fees">$0.00</span></div>
    <div>Orders: <span id="count">0</span></div>
  </div>

  <!-- Active Order Section -->
  <div class="order-card" id="activeOrder">
    <h3 id="orderTitle">Waiting for Orders...</h3>
    <p id="pickupLoc"><strong>Pickup:</strong> -</p>
    <p id="dropoffLoc"><strong>Drop-off:</strong> -</p>
    <button class="btn-action accept" onclick="updateStatus('PICKED_UP')">Accept Order</button>
  </div>

  <!-- Navigation -->
  <button class="btn-action nav-btn" onclick="openMaps()">Open Navigation</button>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js';
    import { getFirestore } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyDbOi2aD5eFsiUi6mfFTS-wOj-jWbi5-9M",
  authDomain: "local-link-mm.firebaseapp.com",
  projectId: "local-link-mm",
  storageBucket: "local-link-mm.firebasestorage.app",
  messagingSenderId: "945184893851",
  appId: "1:945184893851:web:c84bf0bc2db2d2c81a4f3e"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;

    // Configuration: Set this based on the user's profile (Driver or Walker)
    const isWalker = true; 
    document.getElementById('transportMode').innerText = isWalker ? "Mode: Walking 🚶" : "Mode: Driving 🚗";

    window.openMaps = function() {
        const destination = "123+Maple+Ave+Bushbuckridge";
        const travelMode = isWalker ? 'w' : 'd'; 
        window.open(`https://www.google.com/maps/dir/?api=1&destination=${destination}&travelmode=${travelMode}`);
    }

    window.updateStatus = function(status) {
        alert("Status updated to: " + status);
        // You can add your updateDoc function here to sync with Firebase
    }
  </script>
</body>
</html>
